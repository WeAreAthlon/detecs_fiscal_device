name: Publish to pub.dev

on:
  push:
    tags:
      - '**'
  workflow_dispatch:

# Required for pub.dev OIDC authentication
permissions:
  id-token: write

jobs:
  analyze:
    name: Dry Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Verify package score
        run: flutter pub publish --dry-run

  publish:
    name: Publish to pub.dev
    needs: analyze
    runs-on: ubuntu-latest
    environment: pub.dev
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Publish
        run: flutter pub publish --force
